name: Daily Manga Crawl

on:
  schedule:
    # 每天凌晨 2 点运行 (UTC+8 对应 UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Specific URL to crawl (Optional)'
        required: false
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm build --filter=@starye/crawler...

      - name: Run Crawler
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          CRAWLER_SECRET: ${{ secrets.CRAWLER_SECRET }}
          API_URL: ${{ secrets.API_URL }}
          # Puppeteer Cache
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
          # Crawler Configuration (CI defaults are used if not set)
          # 漫画并发数 (默认: 5)
          # CRAWLER_CONCURRENCY_MANGA: 5
          # 章节并发数 (默认: 2)
          # CRAWLER_CONCURRENCY_CHAPTER: 2
          # 图片批量上传数 (默认: 10)
          # CRAWLER_CONCURRENCY_IMAGE_BATCH: 10
          # 每次运行最大漫画数 (默认: 20)
          # CRAWLER_LIMIT_MAX_MANGAS_PER_RUN: 20
          # 新漫画最大章节数 (默认: 5)
          # CRAWLER_LIMIT_MAX_CHAPTERS_PER_NEW: 5
          # 更新漫画最大章节数 (默认: 20)
          # CRAWLER_LIMIT_MAX_CHAPTERS_PER_UPDATE: 20
          # 软超时时间（分钟，默认: 300）
          # CRAWLER_LIMIT_TIMEOUT_MINUTES: 300
        run: |
          # 动态查找 Chrome 路径
          export PUPPETEER_EXECUTABLE_PATH=$(which google-chrome-stable || which google-chrome || which chromium-browser)
          echo "Found Chrome at: $PUPPETEER_EXECUTABLE_PATH"

          # 如果有输入 URL 则使用，否则默认爬取首页（示例）
          TARGET="${{ inputs.target_url }}"
          if [ -z "$TARGET" ]; then
            TARGET="https://www.92hm.life/booklist?end=0" # 默认目标: 最新更新列表
          fi

          echo "Starting crawl for: $TARGET"

          # 使用 puppeteer-headful (xvfb) 或者直接使用 chrome-headless-shell
          # 这里假设 base-crawler 配置了自动使用 headless
          # Node.js 内存限制（可选，默认 ~4GB 足够）：
          # NODE_OPTIONS="--max-old-space-size=5120" pnpm --filter @starye/crawler start "$TARGET"

          pnpm --filter @starye/crawler start "$TARGET"

      - name: Build & Upload Search Index
        if: success()
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          API_URL: ${{ secrets.API_URL }}
          CRAWLER_SECRET: ${{ secrets.CRAWLER_SECRET }}
        run: |
          echo "Building Orama Search Index..."
          pnpm --filter @starye/crawler build:search
