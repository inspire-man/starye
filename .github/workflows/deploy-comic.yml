name: Deploy Comic App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/comic-app/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Comic App (Pages)
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Comic App
        env:
          VITE_API_URL: https://starye.org
        run: pnpm --filter @starye/comic-app run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 部署到 Cloudflare Pages（项目已存在，无需创建）
          pnpm exec wrangler pages deploy apps/comic-app/dist --project-name=starye-comic --commit-dirty=true
