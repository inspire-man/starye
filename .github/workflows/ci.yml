name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migration-destructive-scan:
    runs-on: ubuntu-latest
    outputs:
      requires_ack: ${{ steps.scan.outputs.requires_ack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect destructive migration SQL
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            FILES=$(git diff --name-only "$BASE_REF" "${{ github.sha }}" -- packages/db/drizzle/*.sql || true)
          else
            BASE_SHA="${{ github.event.before }}"
            FILES=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- packages/db/drizzle/*.sql || true)
          fi

          if [ -z "$FILES" ]; then
            echo "requires_ack=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -EIn "(DROP[[:space:]]+COLUMN|DROP[[:space:]]+TABLE|ALTER[[:space:]]+TABLE.+DROP)" $FILES; then
            echo "requires_ack=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_ack=false" >> "$GITHUB_OUTPUT"
          fi

  migration-reviewer-ack:
    needs: migration-destructive-scan
    if: ${{ needs.migration-destructive-scan.outputs.requires_ack == 'true' }}
    runs-on: ubuntu-latest
    environment: production-migration-review
    steps:
      - name: Reviewer Ack Recorded
        run: |
          echo "Destructive migration detected in PR diff."
          echo "Protected environment approval is the explicit reviewer ack path."

  test:
    needs:
      - migration-destructive-scan
      - migration-reviewer-ack
    if: ${{ always() && needs.migration-destructive-scan.result == 'success' && (needs.migration-reviewer-ack.result == 'success' || needs.migration-reviewer-ack.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Setup Test Environment
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=test" >> $GITHUB_ENV
          echo "CLOUDFLARE_DATABASE_ID=test" >> $GITHUB_ENV
          echo "CLOUDFLARE_D1_TOKEN=test" >> $GITHUB_ENV

      - name: Run Unit Tests
        run: pnpm test

      - name: Run E2E Tests
        run: |
          cd apps/movie-app
          pnpm run playwright:install
          pnpm run test:e2e html-integration.spec.ts
