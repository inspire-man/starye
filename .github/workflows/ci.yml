name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Setup Test Environment
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=test" >> $GITHUB_ENV
          echo "CLOUDFLARE_DATABASE_ID=test" >> $GITHUB_ENV
          echo "CLOUDFLARE_D1_TOKEN=test" >> $GITHUB_ENV

      - name: Run Unit Tests
        run: pnpm test

      - name: Run E2E Tests
        run: |
          cd apps/movie-app
          pnpm run playwright:install
          pnpm run test:e2e html-integration.spec.ts
