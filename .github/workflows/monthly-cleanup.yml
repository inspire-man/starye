name: Monthly Data Cleanup

on:
  schedule:
    # 每月 1 号 UTC 19:00 运行（北京时间次日凌晨 3:00）
    - cron: '0 19 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (preview only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  D1_DB_NAME: starye-db

jobs:
  cleanup-backup-fields:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Data Integrity Check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║   电影备份字段清理工具 (CI)         ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "🔍 步骤 1: 检查数据完整性..."
          echo ""

          # 从 wrangler --json 输出中提取数值的通用函数
          # wrangler D1 JSON 格式: [{"results":[{"c":123}],"success":true,"meta":{...}}]
          parse_count() {
            node --input-type=module <<'JSEOF'
              import { createInterface } from 'readline';
              const lines = [];
              const rl = createInterface({ input: process.stdin });
              rl.on('line', l => lines.push(l));
              rl.on('close', () => {
                const raw = lines.join('\n');
                // 提取第一个完整 JSON 数组（跳过 wrangler 输出的非 JSON 行）
                const match = raw.match(/(\[[\s\S]*\])/);
                if (!match) { console.log('0'); process.exit(0); }
                try {
                  const data = JSON.parse(match[1]);
                  const row = data?.[0]?.results?.[0];
                  console.log(String(row?.c ?? row?.count ?? 0));
                } catch { console.log('0'); }
              });
JSEOF
          }

          MOVIES_TOTAL=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie;" --json 2>&1 | parse_count)
          echo "   电影总数: $MOVIES_TOTAL"

          WITH_ACTORS=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie WHERE actors IS NOT NULL;" --json 2>&1 | parse_count)
          echo "   有 actors 字段的电影: $WITH_ACTORS"

          WITH_PUBLISHER=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie WHERE publisher IS NOT NULL;" --json 2>&1 | parse_count)
          echo "   有 publisher 字段的电影: $WITH_PUBLISHER"

          ACTOR_RELATIONS=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie_actor;" --json 2>&1 | parse_count)
          echo "   movie_actor 关联记录: $ACTOR_RELATIONS"

          PUBLISHER_RELATIONS=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie_publisher;" --json 2>&1 | parse_count)
          echo "   movie_publisher 关联记录: $PUBLISHER_RELATIONS"

          echo ""
          echo "📊 数据完整性评估:"

          SAFE=true
          if [ "$ACTOR_RELATIONS" = "0" ] && [ "$WITH_ACTORS" != "0" ]; then
            echo "   ⚠️  关联表 movie_actor 为空，但 movie.actors 字段有数据！"
            SAFE=false
          fi
          if [ "$PUBLISHER_RELATIONS" = "0" ] && [ "$WITH_PUBLISHER" != "0" ]; then
            echo "   ⚠️  关联表 movie_publisher 为空，但 movie.publisher 字段有数据！"
            SAFE=false
          fi

          if [ "$SAFE" = true ] && [ "$ACTOR_RELATIONS" != "0" ]; then
            echo "   ✅ 数据完整性检查通过"
          else
            echo "   ❌ 数据完整性检查未通过"
          fi

          echo ""
          echo "📋 步骤 2: 清理预览"
          echo "   将清理的字段:"
          echo "   - movie.actors: $WITH_ACTORS 条记录"
          echo "   - movie.publisher: $WITH_PUBLISHER 条记录"

          if [ "$WITH_ACTORS" = "0" ] && [ "$WITH_PUBLISHER" = "0" ]; then
            echo "   ℹ️  没有需要清理的数据"
          fi

          # 保存状态供后续步骤使用
          echo "SAFE_TO_CLEAN=$SAFE" >> $GITHUB_ENV
          echo "WITH_ACTORS=$WITH_ACTORS" >> $GITHUB_ENV
          echo "WITH_PUBLISHER=$WITH_PUBLISHER" >> $GITHUB_ENV

      - name: Execute Cleanup
        if: ${{ github.event.inputs.dry_run == 'false' && env.SAFE_TO_CLEAN == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🗑️  步骤 3: 执行清理..."
          echo ""

          if [ "$WITH_ACTORS" != "0" ]; then
            echo "   清理 movie.actors 字段..."
            npx wrangler d1 execute $D1_DB_NAME --remote \
              --command "UPDATE movie SET actors = NULL WHERE actors IS NOT NULL;"
            echo "   ✅ movie.actors 清理完成"
          fi

          if [ "$WITH_PUBLISHER" != "0" ]; then
            echo "   清理 movie.publisher 字段..."
            npx wrangler d1 execute $D1_DB_NAME --remote \
              --command "UPDATE movie SET publisher = NULL WHERE publisher IS NOT NULL;"
            echo "   ✅ movie.publisher 清理完成"
          fi

          echo ""
          echo "✓ 步骤 4: 验证清理结果..."

          parse_count() {
            node --input-type=module <<'JSEOF'
              import { createInterface } from 'readline';
              const lines = [];
              const rl = createInterface({ input: process.stdin });
              rl.on('line', l => lines.push(l));
              rl.on('close', () => {
                const raw = lines.join('\n');
                const match = raw.match(/(\[[\s\S]*\])/);
                if (!match) { console.log('0'); process.exit(0); }
                try {
                  const data = JSON.parse(match[1]);
                  const row = data?.[0]?.results?.[0];
                  console.log(String(row?.c ?? row?.count ?? 0));
                } catch { console.log('0'); }
              });
JSEOF
          }

          AFTER_ACTORS=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie WHERE actors IS NOT NULL;" --json 2>&1 | parse_count)

          AFTER_PUBLISHER=$(npx wrangler d1 execute $D1_DB_NAME --remote \
            --command "SELECT count(*) as c FROM movie WHERE publisher IS NOT NULL;" --json 2>&1 | parse_count)

          echo "   清理前后对比:"
          echo "   - movie.actors: $WITH_ACTORS → $AFTER_ACTORS"
          echo "   - movie.publisher: $WITH_PUBLISHER → $AFTER_PUBLISHER"

          if [ "$AFTER_ACTORS" = "0" ] && [ "$AFTER_PUBLISHER" = "0" ]; then
            echo "   🎉 清理成功完成！"
          else
            echo "   ⚠️  部分数据未清理"
          fi

      - name: Skip Cleanup (Preview Mode)
        if: ${{ github.event.inputs.dry_run != 'false' || env.SAFE_TO_CLEAN != 'true' }}
        run: |
          if [ "$SAFE_TO_CLEAN" != "true" ]; then
            echo "❌ 数据完整性检查未通过，跳过清理"
          else
            echo "💡 预览模式，未执行实际清理"
            echo "   手动触发时选择 dry_run=false 执行清理"
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ 清理任务失败，请检查日志"
