name: Monthly Data Cleanup

on:
  schedule:
    # 每月 1 号 UTC 19:00 运行（北京时间次日凌晨 3:00）
    - cron: '0 19 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (preview only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  D1_DB_NAME: starye-db

jobs:
  cleanup-backup-fields:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Data Integrity Check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║   电影备份字段清理工具 (CI)         ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "🔍 步骤 1: 检查数据完整性..."
          echo ""

          # 从 wrangler --json 输出中提取 count 数值
          # 使用 node -e "..." 而非 heredoc，避免 stdin 被 heredoc 占用导致管道数据丢失
          parse_count() {
            node -e "
              let raw = '';
              process.stdin.on('data', chunk => raw += chunk);
              process.stdin.on('end', () => {
                const m = raw.match(/\[[\s\S]*\]/);
                if (!m) return process.stdout.write('0\n');
                try {
                  const data = JSON.parse(m[0]);
                  const row = data?.[0]?.results?.[0];
                  process.stdout.write(String(row?.c ?? row?.count ?? 0) + '\n');
                } catch { process.stdout.write('0\n'); }
              });
            "
          }

          # 执行 D1 查询并解析，wrangler 的 stderr 日志合并到 stdout 一起传入解析器
          d1_count() {
            npx wrangler d1 execute "$D1_DB_NAME" --remote --command "$1" --json 2>&1 | parse_count
          }

          MOVIES_TOTAL=$(d1_count "SELECT count(*) as c FROM movie;")
          echo "   电影总数: $MOVIES_TOTAL"

          WITH_ACTORS=$(d1_count "SELECT count(*) as c FROM movie WHERE actors IS NOT NULL;")
          echo "   有 actors 字段的电影: $WITH_ACTORS"

          WITH_PUBLISHER=$(d1_count "SELECT count(*) as c FROM movie WHERE publisher IS NOT NULL;")
          echo "   有 publisher 字段的电影: $WITH_PUBLISHER"

          ACTOR_RELATIONS=$(d1_count "SELECT count(*) as c FROM movie_actor;")
          echo "   movie_actor 关联记录: $ACTOR_RELATIONS"

          PUBLISHER_RELATIONS=$(d1_count "SELECT count(*) as c FROM movie_publisher;")
          echo "   movie_publisher 关联记录: $PUBLISHER_RELATIONS"

          echo ""
          echo "📊 数据完整性评估:"

          SAFE=true
          if [ "$ACTOR_RELATIONS" = "0" ] && [ "$WITH_ACTORS" != "0" ]; then
            echo "   ⚠️  关联表 movie_actor 为空，但 movie.actors 字段有数据！"
            SAFE=false
          fi
          if [ "$PUBLISHER_RELATIONS" = "0" ] && [ "$WITH_PUBLISHER" != "0" ]; then
            echo "   ⚠️  关联表 movie_publisher 为空，但 movie.publisher 字段有数据！"
            SAFE=false
          fi

          if [ "$SAFE" = "true" ] && [ "$ACTOR_RELATIONS" != "0" ]; then
            echo "   ✅ 数据完整性检查通过"
          else
            echo "   ❌ 数据完整性检查未通过"
          fi

          echo ""
          echo "📋 步骤 2: 清理预览"
          echo "   将清理的字段:"
          echo "   - movie.actors: $WITH_ACTORS 条记录"
          echo "   - movie.publisher: $WITH_PUBLISHER 条记录"

          if [ "$WITH_ACTORS" = "0" ] && [ "$WITH_PUBLISHER" = "0" ]; then
            echo "   ℹ️  没有需要清理的数据"
          fi

          # 保存状态供后续步骤使用
          echo "SAFE_TO_CLEAN=$SAFE" >> "$GITHUB_ENV"
          echo "WITH_ACTORS=$WITH_ACTORS" >> "$GITHUB_ENV"
          echo "WITH_PUBLISHER=$WITH_PUBLISHER" >> "$GITHUB_ENV"

      - name: Execute Cleanup
        if: ${{ github.event.inputs.dry_run == 'false' && env.SAFE_TO_CLEAN == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🗑️  步骤 3: 执行清理..."
          echo ""

          if [ "$WITH_ACTORS" != "0" ]; then
            echo "   清理 movie.actors 字段..."
            npx wrangler d1 execute "$D1_DB_NAME" --remote \
              --command "UPDATE movie SET actors = NULL WHERE actors IS NOT NULL;"
            echo "   ✅ movie.actors 清理完成"
          fi

          if [ "$WITH_PUBLISHER" != "0" ]; then
            echo "   清理 movie.publisher 字段..."
            npx wrangler d1 execute "$D1_DB_NAME" --remote \
              --command "UPDATE movie SET publisher = NULL WHERE publisher IS NOT NULL;"
            echo "   ✅ movie.publisher 清理完成"
          fi

          echo ""
          echo "✓ 步骤 4: 验证清理结果..."

          parse_count() {
            node -e "
              let raw = '';
              process.stdin.on('data', chunk => raw += chunk);
              process.stdin.on('end', () => {
                const m = raw.match(/\[[\s\S]*\]/);
                if (!m) return process.stdout.write('0\n');
                try {
                  const data = JSON.parse(m[0]);
                  const row = data?.[0]?.results?.[0];
                  process.stdout.write(String(row?.c ?? row?.count ?? 0) + '\n');
                } catch { process.stdout.write('0\n'); }
              });
            "
          }

          d1_count() {
            npx wrangler d1 execute "$D1_DB_NAME" --remote --command "$1" --json 2>&1 | parse_count
          }

          AFTER_ACTORS=$(d1_count "SELECT count(*) as c FROM movie WHERE actors IS NOT NULL;")
          AFTER_PUBLISHER=$(d1_count "SELECT count(*) as c FROM movie WHERE publisher IS NOT NULL;")

          echo "   清理前后对比:"
          echo "   - movie.actors: $WITH_ACTORS → $AFTER_ACTORS"
          echo "   - movie.publisher: $WITH_PUBLISHER → $AFTER_PUBLISHER"

          if [ "$AFTER_ACTORS" = "0" ] && [ "$AFTER_PUBLISHER" = "0" ]; then
            echo "   🎉 清理成功完成！"
          else
            echo "   ⚠️  部分数据未清理"
          fi

      - name: Skip Cleanup (Preview Mode)
        if: ${{ github.event.inputs.dry_run != 'false' || env.SAFE_TO_CLEAN != 'true' }}
        run: |
          if [ "$SAFE_TO_CLEAN" != "true" ]; then
            echo "❌ 数据完整性检查未通过，跳过清理"
          else
            echo "💡 预览模式，未执行实际清理"
            echo "   手动触发时选择 dry_run=false 执行清理"
          fi

      # 每次运行都自动清理镜像站封面（无论 dry_run 模式，因为该操作安全且无副作用）
      - name: Cleanup Invalid Cover Images
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🖼️  检查并清理无效封面图片（镜像站域名）..."
          echo ""

          parse_count() {
            node -e "
              let raw = '';
              process.stdin.on('data', chunk => raw += chunk);
              process.stdin.on('end', () => {
                const m = raw.match(/\[[\s\S]*\]/);
                if (!m) return process.stdout.write('0\n');
                try {
                  const data = JSON.parse(m[0]);
                  const row = data?.[0]?.results?.[0];
                  process.stdout.write(String(row?.c ?? row?.count ?? 0) + '\n');
                } catch { process.stdout.write('0\n'); }
              });
            "
          }

          d1_count() {
            npx wrangler d1 execute "$D1_DB_NAME" --remote --command "$1" --json 2>&1 | parse_count
          }

          # 统计各镜像站封面数量
          MIRROR_DOMAINS="dmmbus.cyou busdmm.bond cdnbus.cyou javsee.cyou"
          TOTAL_INVALID=0

          for DOMAIN in $MIRROR_DOMAINS; do
            COUNT=$(d1_count "SELECT count(*) as c FROM movie WHERE cover_image LIKE '%${DOMAIN}%';")
            if [ "$COUNT" != "0" ]; then
              echo "   ⚠️  发现 $COUNT 个封面来自 $DOMAIN"
              TOTAL_INVALID=$((TOTAL_INVALID + COUNT))
            fi
          done

          # 同样检查 actor.avatar 和 publisher.logo
          ACTOR_INVALID=0
          PUBLISHER_INVALID=0
          for DOMAIN in $MIRROR_DOMAINS; do
            AC=$(d1_count "SELECT count(*) as c FROM actor WHERE avatar LIKE '%${DOMAIN}%';")
            PC=$(d1_count "SELECT count(*) as c FROM publisher WHERE logo LIKE '%${DOMAIN}%';")
            ACTOR_INVALID=$((ACTOR_INVALID + AC))
            PUBLISHER_INVALID=$((PUBLISHER_INVALID + PC))
          done

          echo "   电影封面无效数: $TOTAL_INVALID"
          echo "   演员头像无效数: $ACTOR_INVALID"
          echo "   厂商 logo 无效数: $PUBLISHER_INVALID"
          echo ""

          GRAND_TOTAL=$((TOTAL_INVALID + ACTOR_INVALID + PUBLISHER_INVALID))
          if [ "$GRAND_TOTAL" = "0" ]; then
            echo "   ✅ 没有镜像站图片，无需清理"
            exit 0
          fi

          echo "   共 $GRAND_TOTAL 条记录需要清理，开始处理..."

          # 清理电影封面
          for DOMAIN in $MIRROR_DOMAINS; do
            npx wrangler d1 execute "$D1_DB_NAME" --remote \
              --command "UPDATE movie SET cover_image = NULL WHERE cover_image LIKE '%${DOMAIN}%';" 2>&1 | tail -1
          done

          # 清理演员头像
          for DOMAIN in $MIRROR_DOMAINS; do
            npx wrangler d1 execute "$D1_DB_NAME" --remote \
              --command "UPDATE actor SET avatar = NULL, cover = NULL WHERE avatar LIKE '%${DOMAIN}%' OR cover LIKE '%${DOMAIN}%';" 2>&1 | tail -1
          done

          # 清理厂商 logo
          for DOMAIN in $MIRROR_DOMAINS; do
            npx wrangler d1 execute "$D1_DB_NAME" --remote \
              --command "UPDATE publisher SET logo = NULL WHERE logo LIKE '%${DOMAIN}%';" 2>&1 | tail -1
          done

          # 验证结果
          REMAINING=0
          for DOMAIN in $MIRROR_DOMAINS; do
            C1=$(d1_count "SELECT count(*) as c FROM movie WHERE cover_image LIKE '%${DOMAIN}%';")
            C2=$(d1_count "SELECT count(*) as c FROM actor WHERE avatar LIKE '%${DOMAIN}%';")
            C3=$(d1_count "SELECT count(*) as c FROM publisher WHERE logo LIKE '%${DOMAIN}%';")
            REMAINING=$((REMAINING + C1 + C2 + C3))
          done

          if [ "$REMAINING" = "0" ]; then
            echo "   ✅ 封面清理完成，共处理 $GRAND_TOTAL 条记录"
          else
            echo "   ⚠️  仍有 $REMAINING 条记录未清理，请检查"
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ 清理任务失败，请检查日志"
