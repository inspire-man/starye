name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target:
        description: Selected tracked deployment target
        required: true
        type: string
      app:
        description: Worker or Pages application category
        required: true
        type: choice
        options: [api, gateway, pages]
      version_id:
        description: Worker version id; retained for Pages manual guidance
        required: true
        type: string
      pages_surface:
        description: Required typed Pages surface for a manual Pages rollback
        required: true
        type: string

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
    env:
      STARYE_TARGET_ID: starye-org
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v6.3.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - id: resolve
        shell: bash
        env:
          INPUT_TARGET: ${{ inputs.target || '' }}
        run: |
          set -euo pipefail
          target="${INPUT_TARGET:-$STARYE_TARGET_ID}"
          test -n "$target"
          output="$(pnpm target-profile validate --target "$target")"
          github_environment="$(printf '%s\n' "$output" | sed -n 's/^CI GitHub environment: //p')"
          test -n "$github_environment"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "github_environment=$github_environment" >> "$GITHUB_OUTPUT"

  rollback-worker:
    if: ${{ inputs.app == 'api' || inputs.app == 'gateway' }}
    needs: resolve-target
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.github_environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v6.3.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - id: prepare
        run: pnpm target-profile prepare-mutation --scope ci --target "${{ needs.resolve-target.outputs.target }}" --ci-environment "${{ needs.resolve-target.outputs.github_environment }}" --command worker-deploy --github-output "$GITHUB_OUTPUT"
      - name: Rollback selected API Worker
        if: ${{ inputs.app == 'api' }}
        run: pnpm exec wrangler rollback "${{ inputs.version_id }}" --config "${{ steps.prepare.outputs.api_config_path }}" --yes
      - name: Rollback selected Gateway Worker
        if: ${{ inputs.app == 'gateway' }}
        run: pnpm exec wrangler rollback "${{ inputs.version_id }}" --config "${{ steps.prepare.outputs.gateway_config_path }}" --yes
      - name: Remove generated target files
        if: always()
        run: rm -f "${{ steps.prepare.outputs.api_config_path }}" "${{ steps.prepare.outputs.gateway_config_path }}" "${{ steps.prepare.outputs.prepared_context_path }}"

  rollback-pages-manual:
    if: ${{ inputs.app == 'pages' }}
    needs: resolve-target
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.github_environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v6.3.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - id: prepare
        run: pnpm target-profile prepare-mutation --scope ci --target "${{ needs.resolve-target.outputs.target }}" --ci-environment "${{ needs.resolve-target.outputs.github_environment }}" --command pages-rollback --surface "${{ inputs.pages_surface }}" --github-output "$GITHUB_OUTPUT"
      - name: Fail closed with selected Pages project
        run: |
          echo "Pages rollback remains manual for ${{ steps.prepare.outputs.pages_project }}."
          exit 1
      - name: Remove generated target files
        if: always()
        run: rm -f "${{ steps.prepare.outputs.api_config_path }}" "${{ steps.prepare.outputs.gateway_config_path }}" "${{ steps.prepare.outputs.pages_build_env_path }}" "${{ steps.prepare.outputs.prepared_context_path }}"
