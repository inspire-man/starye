name: Deploy Movie

on:
  push:
    branches:
      - main
    paths:
      - 'apps/movie-app/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Movie App (Pages)
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API Type Declarations
        run: pnpm exec tsc -b packages/api-types

      - name: Build Movie App
        env:
          VITE_API_URL: https://starye.org
        run: pnpm --filter @starye/movie-app run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 尝试创建项目（如果不存在）
          pnpm exec wrangler pages project create starye-movie --production-branch=main || true
          # 部署到 Cloudflare Pages（使用英文 commit message 避免 UTF-8 编码问题）
          COMMIT_MSG=$(git log -1 --format=%s | iconv -f UTF-8 -t ASCII//TRANSLIT//IGNORE || echo "Deploy Movie App")
          pnpm exec wrangler pages deploy apps/movie-app/dist \
            --project-name=starye-movie \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="$COMMIT_MSG" \
            --commit-dirty=true
