name: Deploy D1 Migrations

on:
  push:
    branches: [main]
    paths: ['packages/db/**', '.github/workflows/deploy-migrations.yml']
  workflow_dispatch:
    inputs:
      target:
        description: Selected tracked deployment target
        required: true
        type: string

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
    env:
      STARYE_TARGET_ID: starye-org
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v6.3.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - id: resolve
        shell: bash
        env:
          INPUT_TARGET: ${{ inputs.target || '' }}
        run: |
          set -euo pipefail
          target="${INPUT_TARGET:-$STARYE_TARGET_ID}"
          test -n "$target"
          output="$(pnpm target-profile validate --target "$target")"
          github_environment="$(printf '%s\n' "$output" | sed -n 's/^CI GitHub environment: //p')"
          test -n "$github_environment"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "github_environment=$github_environment" >> "$GITHUB_OUTPUT"

  destructive-migration-gate:
    runs-on: ubuntu-latest
    outputs:
      requires_ack: ${{ steps.scan.outputs.requires_ack }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - id: scan
        shell: bash
        run: |
          set -euo pipefail
          files="$(find packages/db/drizzle -maxdepth 1 -name '*.sql' -print)"
          if grep -EIn '(DROP[[:space:]]+COLUMN|DROP[[:space:]]+TABLE|ALTER[[:space:]]+TABLE.+DROP)' $files; then
            echo 'requires_ack=true' >> "$GITHUB_OUTPUT"
          else
            echo 'requires_ack=false' >> "$GITHUB_OUTPUT"
          fi

  reviewer-ack:
    needs: destructive-migration-gate
    if: ${{ needs.destructive-migration-gate.outputs.requires_ack == 'true' }}
    runs-on: ubuntu-latest
    environment: production-migration-review
    steps:
      - run: echo 'Destructive migration review approved.'

  migrate:
    needs: [resolve-target, destructive-migration-gate, reviewer-ack]
    if: ${{ always() && needs.resolve-target.result == 'success' && needs.destructive-migration-gate.result == 'success' && (needs.reviewer-ack.result == 'success' || needs.reviewer-ack.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.github_environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v6.3.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - id: prepare
        run: pnpm target-profile prepare-mutation --scope ci --target "${{ needs.resolve-target.outputs.target }}" --ci-environment "${{ needs.resolve-target.outputs.github_environment }}" --command d1-migrate --github-output "$GITHUB_OUTPUT"
      - name: Export selected backup and apply migration
        run: pnpm target-profile run-prepared-entry --entry d1-migrate --prepared-context "${{ steps.prepare.outputs.prepared_context_path }}"
      - name: Remove generated target files
        if: always()
        run: rm -f "${{ steps.prepare.outputs.api_config_path }}" "${{ steps.prepare.outputs.gateway_config_path }}" "${{ steps.prepare.outputs.prepared_context_path }}"
