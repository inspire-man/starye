shellEmulator: true

trustPolicy: no-downgrade
packages:
  - apps/*
  - packages/*
overrides:
  chokidar: ^5.0.0
  semver: ^7.7.3
  undici: ^7.18.2
  undici-types: ^7.18.2
ignoredBuiltDependencies:
  - better-sqlite3

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/engines'
  - better-sqlite3
  - core-js
  - es5-ext
  - esbuild
  - prisma
  - puppeteer
  - sharp
  - vue-demi
  - workerd
