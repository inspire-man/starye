shellEmulator: true

trustPolicy: no-downgrade
packages:
  - apps/*
  - packages/*
overrides:
  chokidar: ^5.0.0
  semver: ^7.7.3
  undici: ^7.18.2
  undici-types: ^7.18.2
ignoredBuiltDependencies:
  - better-sqlite3

onlyBuiltDependencies:
  - '@sentry/cli'
  - '@parcel/watcher'
  - '@prisma/engines'
  - better-sqlite3
  - core-js
  - es5-ext
  - esbuild
  - prisma
  - puppeteer
  - sharp
  - vue-demi
  - workerd

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  better-sqlite3: true
  core-js: true
  es5-ext: true
  esbuild: true
  prisma: true
  puppeteer: true
  sharp: true
  vue-demi: true
  workerd: true
