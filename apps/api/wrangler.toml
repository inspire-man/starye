name = "starye-api"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = [ "nodejs_compat" ]

# Vars for secrets (set via wrangler secret put or .dev.vars)
[vars]
# BETTER_AUTH_SECRET = "..."
# CRAWLER_SECRET = "..."
WEB_URL = "https://starye.org"
ADMIN_URL = "https://dashboard.starye.org"
# R2_PUBLIC_URL = "https://cdn.starye.org" # 配置 R2 public bucket 的 CDN 域名

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "starye-db"
database_id = "72b60b6c-806f-4795-a846-9b0d157b8225"
migrations_dir = "../../packages/db/drizzle"

# R2 Bucket Binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "starye-media"

# Custom Domain
[[routes]]
pattern = "api.starye.org"
custom_domain = true

# KV Namespace for caching (暂时禁用，需要先创建真实的 KV namespace)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id" # 生产环境需要创建真实的 KV namespace ID
# preview_id = "your-preview-kv-id" # 开发环境会自动使用本地 KV

[observability]

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1
persist = true
